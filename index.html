<!DOCTYPE html>
<html>
<head>
    <title>WiFi Sniffer Dashboard</title>
    <style>
        body { font-family: monospace; background: #111; color: #0f0; padding: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 6px 12px; border: 1px solid #333; text-align: left; }
        th { color: #fff; background: #222; }
        tr:hover { background: #1a1a1a; }
    </style>
</head>
<body>
    <h2>📡 WiFi Sniffer Live Feed</h2>
    <p id="count">Loading...</p>
    <table>
        <thead><tr><th>Time</th><th>RSSI</th><th>Channel</th><th>Source MAC</th><th>Dest MAC</th></tr></thead>
        <tbody id="feed"></tbody>
    </table>
    <script>
        async function refresh() {
            const res = await fetch('/packets');
            const data = await res.json();
            document.getElementById('count').textContent = `${data.length} packets captured`;
            document.getElementById('feed').innerHTML = data.map(p => `
                <tr>
                    <td>${new Date(p.time).toLocaleTimeString()}</td>
                    <td>${p.rssi} dBm</td>
                    <td>${p.channel}</td>
                    <td>${p.src}</td>
                    <td>${p.dest}</td>
                </tr>`).join('');
        }
        refresh();
        setInterval(refresh, 2000); // auto-refresh every 2 seconds
    </script>
</body>
</html>
